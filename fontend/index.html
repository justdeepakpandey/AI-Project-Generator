<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Project Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Project Generator</h1>
        <p class="subtitle">
            Generate complete software project ideas using Gemini AI.
        </p>
        <div class="card">
            <input
                type="text"
                placeholder="Enter your skills (Java, React, SQL...)"
            >
            <select>
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Advanced</option>
            </select>
            <select>
                <option>Web Development</option>
                <option>Android</option>
                <option>AI / ML</option>
                <option>Full Stack</option>
            </select>
            <button>
                Generate Project
            </button>
        </div>
        <div class="result">
            <h2>Generated Project</h2>
            <p>
                Your AI generated project will appear here.
            </p>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
